backend:
  name: github
  repo: hqq17222/lab-website
  branch: main
  auth_type: pkce
  app_id: Ov23liXEpMvEY4Ac4eGR

# 访问地址: https://hqq17222.github.io/lab-website/admin/
publish_mode: editorial_workflow

media_folder: public/images
public_folder: /lab-website/images

locale: zh_Hans

collections:
  # ── 团队成员 ──────────────────────────────────────
  - name: team
    label: 团队成员
    files:
      - file: src/data/team.json
        label: 团队信息
        name: team
        fields:
          - label: 负责人信息
            name: pi
            widget: object
            fields:
              - { label: 姓名（中文）, name: name_zh, widget: string }
              - { label: Name (English), name: name_en, widget: string }
              - { label: 职称（中文）, name: title_zh, widget: string }
              - { label: Title (English), name: title_en, widget: string }
              - { label: 个人简介（中文）, name: bio_zh, widget: text }
              - { label: Bio (English), name: bio_en, widget: text }
              - { label: 邮箱, name: email, widget: string }
              - { label: ResearchGate 链接, name: researchgate, widget: string }
          - label: 成员列表
            name: members
            widget: list
            fields:
              - { label: 姓名（中文）, name: name_zh, widget: string }
              - { label: Name (English), name: name_en, widget: string }
              - { label: 角色（中文）, name: role_zh, widget: string, hint: "如：博士研究生、硕士研究生" }
              - { label: Role (English), name: role_en, widget: string }
              - { label: 研究方向（中文）, name: direction_zh, widget: string }
              - { label: Research Direction (English), name: direction_en, widget: string }

  # ── 学术成果 ──────────────────────────────────────
  - name: publications
    label: 学术成果
    files:
      - file: src/data/publications.json
        label: 论文列表
        name: publications
        fields:
          - label: 论文列表
            name: items
            widget: list
            fields:
              - { label: 年份, name: year, widget: number, value_type: int }
              - { label: 标题（中文）, name: title_zh, widget: string }
              - { label: Title (English), name: title_en, widget: string }
              - { label: 作者, name: authors, widget: string }
              - { label: 期刊/会议, name: journal, widget: string }
              - { label: DOI, name: doi, widget: string, required: false }
              - { label: 链接 URL, name: url, widget: string, required: false }

  # ── 项目与平台 ─────────────────────────────────────
  - name: projects
    label: 项目与平台
    files:
      - file: src/data/projects.json
        label: 项目信息
        name: projects
        fields:
          - { label: 天空地数据平台 URL（留空则显示"即将上线"）, name: data_platform_url, widget: string, required: false }
          - label: 项目列表
            name: items
            widget: list
            fields:
              - { label: 项目名称（中文）, name: title_zh, widget: string }
              - { label: Project Title (English), name: title_en, widget: string }
              - { label: 资助来源（中文）, name: source_zh, widget: string }
              - { label: Funding Source (English), name: source_en, widget: string }
              - { label: 执行期限, name: period, widget: string, hint: "如：2023–2026" }
              - { label: 状态（中文）, name: status_zh, widget: string, hint: "在研 / 已结题" }
              - { label: Status (English), name: status_en, widget: string, hint: "Ongoing / Completed" }

  # ── 新闻动态 ──────────────────────────────────────
  - name: news
    label: 新闻动态
    files:
      - file: src/data/news.json
        label: 新闻列表
        name: news
        fields:
          - label: 新闻列表
            name: items
            widget: list
            fields:
              - { label: 日期, name: date, widget: datetime, format: YYYY-MM-DD, date_format: YYYY-MM-DD, time_format: false }
              - label: 类别
                name: category
                widget: select
                options:
                  - { label: 科研进展, value: research }
                  - { label: 获奖荣誉, value: award }
                  - { label: 学术活动, value: event }
              - { label: 标题（中文）, name: title_zh, widget: string }
              - { label: Title (English), name: title_en, widget: string }
              - { label: 摘要（中文）, name: summary_zh, widget: text }
              - { label: Summary (English), name: summary_en, widget: text }
